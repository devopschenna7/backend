apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexshop-backend
  template:
    metadata:
      labels:
        app: nexshop-backend
    spec:
      containers:
      - name: backend
        image: backend:latest
        imagePullPolicy: IfNotPresent # Crucial for local kind clusters
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: nexshop-backend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080 # This allows you to access it locally at localhost:30080
